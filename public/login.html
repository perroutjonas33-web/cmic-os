<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CMIC Soluções | Login</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #1E8E5A 0%, #166B43 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 420px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #1E8E5A 0%, #166B43 100%);
      color: white;
      padding: 40px 30px 30px;
      text-align: center;
    }

    .logo {
      width: 60px;
      height: 60px;
      background: white;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-weight: bold;
      font-size: 24px;
      color: #1E8E5A;
    }

    .header h1 {
      font-size: 24px;
      margin-bottom: 8px;
    }

    .header p {
      font-size: 14px;
      opacity: 0.9;
    }

    .content {
      padding: 40px 30px;
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
      border-bottom: 1px solid #E5E7EB;
    }

    .tab-btn {
      flex: 1;
      padding: 12px 0;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      color: #667085;
      transition: all 0.3s;
    }

    .tab-btn.active {
      color: #1E8E5A;
      border-bottom-color: #1E8E5A;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #1F2933;
    }

    input, select {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #D7E5DD;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      transition: all 0.3s;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #1E8E5A;
      box-shadow: 0 0 0 3px rgba(30, 142, 90, 0.1);
    }

    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 10px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #1E8E5A 0%, #166B43 100%);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(30, 142, 90, 0.3);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .error {
      background: #FEE2E2;
      color: #B42318;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 20px;
      border-left: 4px solid #B42318;
      display: none;
    }

    .error.show {
      display: block;
    }

    .success {
      background: #ECFDF3;
      color: #166B43;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 20px;
      border-left: 4px solid #1E8E5A;
      display: none;
    }

    .success.show {
      display: block;
    }

    .loading {
      display: none;
      text-align: center;
      color: #1E8E5A;
      font-size: 14px;
    }

    .loading.show {
      display: block;
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #E5E7EB;
      border-top-color: #1E8E5A;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .footer {
      text-align: center;
      color: #667085;
      font-size: 12px;
      padding: 20px 30px;
      background: #F9FAFB;
      border-top: 1px solid #E5E7EB;
    }

    @media (max-width: 600px) {
      .container {
        border-radius: 0;
      }

      .header {
        padding: 30px 20px 20px;
      }

      .content {
        padding: 30px 20px;
      }

      .footer {
        padding: 15px 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">CM</div>
      <h1>CMIC Soluções</h1>
      <p>Sistema integrado de Ordens de Serviço</p>
    </div>

    <div class="content">
      <div class="tabs">
        <button class="tab-btn active" data-tab="login">Entrar</button>
        <button class="tab-btn" data-tab="signup">Cadastro</button>
      </div>

      <!-- LOGIN TAB -->
      <div id="login" class="tab-content active">
        <div class="error" id="loginError"></div>
        <form id="loginForm">
          <div class="form-group">
            <label for="loginEmail">Email</label>
            <input type="email" id="loginEmail" name="email" required placeholder="seu@email.com"/>
          </div>

          <div class="form-group">
            <label for="loginPassword">Senha</label>
            <input type="password" id="loginPassword" name="password" required placeholder="••••••••"/>
          </div>

          <div class="loading" id="loginLoading">
            <span class="spinner"></span>
            Conectando...
          </div>

          <button type="submit" class="btn btn-primary">Entrar</button>
        </form>
      </div>

      <!-- SIGNUP TAB -->
      <div id="signup" class="tab-content">
        <div class="error" id="signupError"></div>
        <div class="success" id="signupSuccess"></div>
        <form id="signupForm">
          <div class="form-group">
            <label for="signupName">Nome Completo</label>
            <input type="text" id="signupName" name="name" required placeholder="Seu Nome"/>
          </div>

          <div class="form-group">
            <label for="signupEmail">Email</label>
            <input type="email" id="signupEmail" name="email" required placeholder="seu@email.com"/>
          </div>

          <div class="form-group">
            <label for="signupSetor">Setor</label>
            <select id="signupSetor" name="setor_id" required>
              <option value="">Selecione um setor</option>
              <option value="1">Operacional</option>
              <option value="2">Comercial</option>
              <option value="3">Gerência</option>
            </select>
          </div>

          <div class="form-group">
            <label for="signupPassword">Senha</label>
            <input type="password" id="signupPassword" name="password" required placeholder="Mínimo 6 caracteres"/>
          </div>

          <div class="form-group">
            <label for="signupPasswordConfirm">Confirmar Senha</label>
            <input type="password" id="signupPasswordConfirm" name="passwordConfirm" required placeholder="••••••••"/>
          </div>

          <div class="loading" id="signupLoading">
            <span class="spinner"></span>
            Cadastrando...
          </div>

          <button type="submit" class="btn btn-primary">Criar Conta</button>
        </form>
      </div>
    </div>

    <div class="footer">
      CMIC Soluções © 2024 | Acesso seguro
    </div>
  </div>

  <script>
    const API_URL = '/api';
    const DASHBOARD_URL = '/dashboard';
    const ADMIN_URL = '/admin';

    // Tab switching
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const tab = btn.dataset.tab;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(tab).classList.add('active');

        // Clear errors
        document.getElementById('loginError').classList.remove('show');
        document.getElementById('signupError').classList.remove('show');
      });
    });

    // LOGIN FORM
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorDiv = document.getElementById('loginError');
      const loadingDiv = document.getElementById('loginLoading');
      const submitBtn = e.target.querySelector('button[type="submit"]');

      try {
        errorDiv.classList.remove('show');
        loadingDiv.classList.add('show');
        submitBtn.disabled = true;

        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;

        const response = await fetch(`${API_URL}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Erro ao fazer login');
        }

        // Save token
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));

        // Redirect
        if (data.user.role === 'admin') {
          window.location.href = ADMIN_URL;
        } else {
          window.location.href = DASHBOARD_URL;
        }
      } catch (error) {
        errorDiv.textContent = error.message;
        errorDiv.classList.add('show');
      } finally {
        loadingDiv.classList.remove('show');
        submitBtn.disabled = false;
      }
    });

    // SIGNUP FORM
    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorDiv = document.getElementById('signupError');
      const successDiv = document.getElementById('signupSuccess');
      const loadingDiv = document.getElementById('signupLoading');
      const submitBtn = e.target.querySelector('button[type="submit"]');

      try {
        errorDiv.classList.remove('show');
        successDiv.classList.remove('show');
        loadingDiv.classList.add('show');
        submitBtn.disabled = true;

        const name = document.getElementById('signupName').value;
        const email = document.getElementById('signupEmail').value;
        const setor_id = document.getElementById('signupSetor').value;
        const password = document.getElementById('signupPassword').value;
        const passwordConfirm = document.getElementById('signupPasswordConfirm').value;

        if (password !== passwordConfirm) {
          throw new Error('As senhas não conferem');
        }

        const response = await fetch(`${API_URL}/auth/signup`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, setor_id, password }),
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Erro ao cadastrar');
        }

        // Save token
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));

        successDiv.textContent = 'Cadastro realizado com sucesso! Redirecionando...';
        successDiv.classList.add('show');

        // Redirect after 1.5s
        setTimeout(() => {
          window.location.href = DASHBOARD_URL;
        }, 1500);
      } catch (error) {
        errorDiv.textContent = error.message;
        errorDiv.classList.add('show');
      } finally {
        loadingDiv.classList.remove('show');
        submitBtn.disabled = false;
      }
    });

    // Check if already logged in
    window.addEventListener('load', () => {
      const token = localStorage.getItem('token');
      if (token) {
        window.location.href = DASHBOARD_URL;
      }
    });
  </script>
</body>
</html>
